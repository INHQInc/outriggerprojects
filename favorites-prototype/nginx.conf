server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for outrigger.com images and assets
    location /proxy/outrigger/ {
        proxy_pass https://www.outrigger.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.outrigger.com;
        proxy_set_header Referer https://www.outrigger.com/;
        proxy_set_header Accept image/webp,image/apng,image/*,*/*;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
